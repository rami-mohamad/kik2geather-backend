<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Confirmed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        .card {
            background: #ffffff;
            color: #333;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .check {
            font-size: 50px;
            color: #22c55e;
            margin-bottom: 10px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        a.button {
            display: inline-block;
            padding: 12px 25px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }

        a.button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="check">✔</div>
        <h1>Email Confirmed</h1>
        <p>Your account has been successfully verified.</p>
        <p>You can now sign in and start booking your field.</p>

        <a class="button" href="${process.env.APP_URL || " http://localhost:3000"}">
            Go to Login
        </a>
    </div>

</body>
</html>
